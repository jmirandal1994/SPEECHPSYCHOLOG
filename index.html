<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a1628"/>
<title>Speech Psychology & CardioHome</title>
<link rel="icon" href="/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy2:#0f1e35;--navy3:#162447;--navy4:#1d4ed8;
  --accent:#3b82f6;--accent-l:#dbeafe;
  --emerald:#059669;--emerald-l:#d1fae5;--emerald-d:#065f46;
  --amber:#d97706;--amber-l:#fef3c7;
  --red:#dc2626;--red-l:#fee2e2;
  --teal:#0891b2;--teal-l:#cffafe;
  --slate:#f8fafc;--border:#e2e8f0;--border2:#cbd5e1;
  --text1:#0f172a;--text2:#1e293b;--text3:#475569;--text4:#94a3b8;
  --surface:#fff;--sidebar:#0a1628;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --sh-lg:0 10px 40px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.08);
  --r:8px;--r-md:10px;--r-lg:14px;
  --font:'Sora',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
html,body,#app{height:100%;width:100%}
body{font-family:var(--font);background:var(--navy);color:var(--text1);-webkit-font-smoothing:antialiased;overflow:hidden}
#app{display:flex;height:100vh;height:100dvh}

/* AUTH */
.auth-screen{width:100%;display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#050d1a 0%,#0a1628 50%,#0d1f3c 100%);padding:20px}
.auth-card{width:100%;max-width:400px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-lg);padding:36px 32px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-logo img{width:44px;height:44px;object-fit:contain;border-radius:8px}
.auth-logo-text .t1{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.auth-logo-text .t2{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em}
.auth-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.04em;margin-bottom:6px}
.auth-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:28px}
.auth-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:6px;display:block}
.auth-input{width:100%;padding:11px 14px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r);font-size:14px;font-family:var(--font);color:#fff;outline:none;transition:border-color .2s;margin-bottom:14px}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:rgba(255,255,255,.2)}
.auth-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1d4ed8,#1e3a8a);border:none;border-radius:var(--r);font-size:14px;font-weight:700;font-family:var(--font);color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(29,78,216,.4);letter-spacing:-.01em;margin-top:4px}
.auth-btn:hover{box-shadow:0 6px 28px rgba(29,78,216,.5);transform:translateY(-1px)}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-err{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:14px}
.auth-link{text-align:center;margin-top:16px;font-size:12px;color:rgba(255,255,255,.25);cursor:pointer}
.auth-link:hover{color:rgba(255,255,255,.5)}

/* SHELL */
.shell{display:flex;width:100%;height:100dvh;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;background:var(--sidebar);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s ease}
.brand{padding:16px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.brand-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.brand-img{width:38px;height:38px;object-fit:contain;border-radius:7px;background:rgba(255,255,255,.05);padding:3px;flex-shrink:0}
.brand-t1{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.brand-t2{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.07em}
.role-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:5px 10px}
.role-dot{width:6px;height:6px;border-radius:50%}
.role-label{font-size:10px;color:rgba(255,255,255,.45);font-weight:600}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav::-webkit-scrollbar{width:4px}.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
.nav-section{padding:16px 16px 4px;font-size:9px;font-weight:700;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.1em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--r);cursor:pointer;transition:all .15s;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;position:relative}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(59,130,246,.15);color:#93c5fd;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:2px}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;font-size:9px;padding:2px 6px;font-weight:700;min-width:18px;text-align:center}
.nav-badge.warn{background:var(--amber)}
.sidebar-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 6px;margin-bottom:6px}
.user-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--font);box-shadow:0 0 0 2px rgba(255,255,255,.1)}
.user-name{font-size:12px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.signout-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.15);border-radius:8px;color:rgba(252,165,165,.8);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.signout-btn:hover{background:rgba(220,38,38,.18)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--slate)}

/* TOPBAR */
.topbar{padding:0 28px;height:60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 0 rgba(15,23,42,.04)}
.topbar-left{display:flex;flex-direction:column}
.topbar-title{font-size:16px;font-weight:700;color:var(--text1);letter-spacing:-.03em;line-height:1.2}
.topbar-sub{font-size:11px;color:var(--text4);margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}
.content{padding:24px 28px;overflow-y:auto;flex:1;min-height:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:12.5px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .18s;font-family:var(--font);box-shadow:var(--sh);white-space:nowrap;letter-spacing:-.01em}
.btn:hover{background:#f8fafc;border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#1d4ed8,#1e3a8a);color:#fff;border:none;box-shadow:0 4px 14px rgba(29,78,216,.35)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(29,78,216,.45);transform:translateY(-1px);background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none}
.btn-success{background:linear-gradient(135deg,var(--emerald),var(--emerald-d));color:#fff;border:none}
.btn-success:hover{color:#fff;border:none}
.btn-danger{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.2);color:var(--red)}
.btn-danger:hover{background:rgba(220,38,38,.15);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px}
.btn-ghost{background:transparent;border-color:transparent;box-shadow:none}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r-md);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.card-title{font-size:14px;font-weight:700;color:var(--text1);letter-spacing:-.02em}
.card-sub{font-size:12px;color:var(--text4);margin-top:2px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-green{background:var(--emerald-l);color:var(--emerald-d)}
.badge-blue{background:var(--accent-l);color:#1e40af}
.badge-amber{background:var(--amber-l);color:#92400e}
.badge-red{background:var(--red-l);color:#991b1b}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-teal{background:var(--teal-l);color:#0e7490}
.badge-live{background:rgba(5,150,105,.12);color:var(--emerald);border:1px solid rgba(5,150,105,.25);animation:pulse-badge 2s ease-in-out infinite}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.6}}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:var(--font);color:var(--text1);background:var(--surface);outline:none;transition:border-color .15s;margin-bottom:0}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.form-input option{color:var(--text1)}
textarea.form-input{resize:vertical;min-height:80px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 18px;position:relative;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.stat-card:hover{box-shadow:var(--sh-lg);transform:translateY(-2px)}
.stat-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:2px}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}
.stat-label{font-size:11px;color:var(--text4);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:26px;font-weight:800;color:var(--text1);line-height:1;letter-spacing:-.04em;font-family:var(--font)}
.stat-delta{font-size:11px;color:var(--text4);margin-top:4px}
.stat-delta.warn{color:var(--amber);font-weight:600}

/* TABLE */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc;border-bottom:2px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}

/* ALERT */
.alert{display:flex;gap:12px;padding:12px 16px;border-radius:var(--r-md);border:1px solid;margin-bottom:14px}
.alert-info{background:var(--accent-l);border-color:#93c5fd;color:#1e3a8a}
.alert-warn{background:var(--amber-l);border-color:#fde68a;color:#92400e}
.alert-crit{background:var(--red-l);border-color:#fca5a5;color:#991b1b}
.alert-success{background:var(--emerald-l);border-color:#6ee7b7;color:var(--emerald-d)}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-title{font-weight:700;font-size:13px;margin-bottom:2px}
.alert-msg{font-size:12px;opacity:.85}

/* TABS */
.tabs{display:flex;gap:2px;background:#f1f5f9;border-radius:var(--r);padding:4px;margin-bottom:16px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;color:var(--text4);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--sh)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 24px}
.empty-icon{font-size:48px;margin-bottom:14px}
.empty-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text4);line-height:1.6}

/* SPINNER */
.spinner{width:22px;height:22px;border:2.5px solid rgba(59,130,246,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:var(--r-lg);padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg)}
.modal-title{font-size:16px;font-weight:800;color:var(--text1);margin-bottom:4px;letter-spacing:-.03em}
.modal-sub{font-size:12px;color:var(--text4);margin-bottom:20px}
.modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}

/* GRID HELPERS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g13{display:grid;grid-template-columns:1fr 320px;gap:16px}

/* MOBILE */
.mobile-bar{display:none}
.hamburger{display:none}
.sidebar-overlay{display:none}
.mobile-nav{display:none}

@media(max-width:900px){
  .shell{flex-direction:column}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:900;
    transform:translateX(-100%);width:260px;
    transition:transform .25s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.open{transform:translateX(0);box-shadow:8px 0 40px rgba(0,0,0,.35)}
  .sidebar-overlay{
    display:block;position:fixed;inset:0;
    background:rgba(0,0,0,.45);z-index:800;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .sidebar-overlay.visible{opacity:1;pointer-events:auto}
  .main{height:100dvh;overflow:hidden;display:flex;flex-direction:column}
  #page-content{
    flex:1;overflow-y:auto;min-height:0;
    padding-bottom:calc(72px + env(safe-area-inset-bottom)) !important;
  }
  .mobile-bar{
    display:flex;height:54px;flex-shrink:0;
    background:rgba(255,255,255,.97);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(0,0,0,.07);
    padding:0 16px;align-items:center;justify-content:space-between;
    box-shadow:0 1px 8px rgba(0,0,0,.06);z-index:100;
  }
  .hamburger{
    display:flex;flex-direction:column;gap:5px;
    padding:8px;cursor:pointer;background:none;border:none;flex-shrink:0;
  }
  .hamburger span{display:block;width:22px;height:2px;background:var(--text2);border-radius:2px;transition:all .2s}
  .topbar{display:none}
  .content{padding:16px}
  .stats-grid{grid-template-columns:1fr 1fr!important;gap:10px}
  .g13{grid-template-columns:1fr!important}
  .g2{grid-template-columns:1fr!important}
  .g3{grid-template-columns:1fr 1fr!important}
  .stat-val{font-size:20px}
  .stat-card{padding:14px}
  .card{padding:16px}
  .mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:800;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-top:1px solid rgba(0,0,0,.06);
    padding:6px 8px max(10px,env(safe-area-inset-bottom));
    box-shadow:0 -4px 20px rgba(0,0,0,.08);
    gap:4px;
  }
  .mobile-nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;
    gap:2px;padding:4px 2px;cursor:pointer;
    color:#94a3b8;position:relative;
    border-radius:10px;transition:color .15s;
    min-width:0;
  }
  .mobile-nav-item.active{color:var(--accent)}
  .mobile-nav-icon-wrap{
    width:40px;height:26px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
  }
  .mobile-nav-item.active .mobile-nav-icon-wrap{
    background:rgba(59,130,246,.12);
  }
  .mobile-nav-icon{font-size:18px;line-height:1;display:block}
  .mobile-nav-label{
    font-size:9px;font-weight:700;letter-spacing:.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:100%;text-align:center;
  }
  body{overflow:auto}
  .hide-mobile{display:none!important}
  table th:nth-child(n+4),table td:nth-child(n+4){display:none}
}

/* CHECKIN BUTTON */
.checkin-btn{width:100%;padding:16px;border-radius:var(--r-md);border:none;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 6px 24px rgba(0,0,0,.2);margin-bottom:10px}
.checkin-btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.checkin-btn:not(:disabled):hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
// CONFIG — tu conexión Supabase
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://irodzmlnddwkjyshcgct.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlyb2R6bWxuZGR3a2p5c2hjZ2N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjI2MzIsImV4cCI6MjA5MzM5ODYzMn0.vYXU33gGElZzCwhMTAsMj8b0574jnOosS0L0ZnBzUxs'

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {

})

// ═══════════════════════════════════════════════
// ROUTER — simple hash-based
// ═══════════════════════════════════════════════
let currentRoute = '/'
let currentUser  = null
let currentProfile = null

function navigate(path) {
  currentRoute = path
  render()
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const fmtCLP  = n => n ? `$${Number(n).toLocaleString('es-CL')} CLP` : '$0 CLP'
const fmtTime = ts => ts ? new Date(ts).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}) : '—'
const fmtDate = s => { if(!s) return '—'; const d=new Date(s+'T12:00:00'); const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']; const m=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return `${days[d.getDay()]} ${d.getDate()} ${m[d.getMonth()]}` }
const today   = () => new Date().toISOString().slice(0,10)
const el      = id => document.getElementById(id)
const ini     = name => (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
const isAdmin = () => currentProfile?.role === 'admin'

function escJ(obj) {
  return "'" + JSON.stringify(obj).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'"
}


function showLoading(container) {
  container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;padding:60px;gap:12px"><div class="spinner"></div><span style="color:var(--text4);font-size:14px">Cargando...</span></div>`
}

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
async function loadProfile(userId) {
  const {data} = await db.from('profiles').select('*').eq('id',userId).maybeSingle()
  return data
}

async function signIn(email, password) {
  const {data,error} = await db.auth.signInWithPassword({email,password})
  if (error) throw error
  currentUser    = data.user
  currentProfile = await loadProfile(data.user.id)
  return currentProfile
}

async function signOut() {
  await db.auth.signOut()
  currentUser = null; currentProfile = null
  navigate('/login')
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
async function init() {
  const {data:{session}} = await db.auth.getSession()
  if (session?.user) {
    currentUser    = session.user
    currentProfile = await loadProfile(session.user.id)
  }
  render()
}

function render() {
  const app = el('app')
  if (!currentUser || !currentProfile) {
    renderLogin(app); return
  }
  renderShell(app)
}

    e.preventDefault()
    const btn=el('reg-btn'); btn.disabled=true; btn.textContent='Enviando...'

      full_name: el('r-name').value, rut: el('r-rut').value,
      email: el('r-email').value, phone: el('r-phone').value,

      const e2=el('reg-err'); e2.style.display='block'; e2.textContent=error.message

      el('reg-form').style.display='none'

}

// ═══════════════════════════════════════════════
// PAGE ROUTER
// ═══════════════════════════════════════════════
function renderPage() {
  const pc = el('page-content')
  if (!pc) return
  const r = currentRoute
  if (!isAdmin()) {
    if (r==='/w')             { pageWorkerHome(pc); return }
    if (r==='/w/checkin')     { pageWorkerCheckin(pc); return }
    if (r==='/w/shifts')      { pageWorkerShifts(pc); return }
    if (r==='/w/requests')    { pageWorkerRequests(pc); return }
    if (r==='/w/boletas')     { pageWorkerBoletas(pc); return }
    navigate('/w'); return
  }
  if (r==='/')             { pageDashboard(pc); return }
  if (r==='/workers')      { pageWorkers(pc); return }
  if (r==='/shifts')       { pageShifts(pc); return }
  if (r==='/geo')          { pageGeo(pc); return }
  if (r==='/alerts')       { pageAlerts(pc); return }
  if (r==='/requests')     { pageRequests(pc); return }
  if (r==='/documents')    { pageDocuments(pc); return }
  if (r==='/boletas')      { pageBoletas(pc); return }
  if (r==='/accounts')     { pageAccounts(pc); return }
  if (r==='/users')        { pageUsers(pc); return }
  if (r==='/settings')     { pageSettings(pc); return }
  if (r==='/flujo')        { pageFlujo(pc); return }
  navigate('/')
}

async function pageDashboard(pc) {
  pc.innerHTML = `
  <div class="topbar"><div class="topbar-left"><div class="topbar-title">Dashboard</div><div class="topbar-sub">Resumen operacional</div></div>
    <div class="topbar-right"><button class="btn btn-sm" onclick="pageDashboard(el('page-content'))">↻</button><button class="btn btn-primary btn-sm" onclick="navigate('/shifts')">+ Nuevo turno</button></div>
  </div>
  <div class="content" id="dash-content"><div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spinner" style="width:32px;height:32px"></div></div></div>`

  const todayStr = today()
  const monthStart = new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString()

  const [{count:workers},{count:shifts},{count:late},{data:activity},{data:reqs}] = await Promise.all([
    db.from('profiles').select('*',{count:'exact',head:true}).eq('role','worker').eq('status','active'),
    db.from('shifts').select('*',{count:'exact',head:true}).in('status',['completed','late']).gte('shift_date',monthStart.slice(0,10)),
    db.from('attendances').select('*',{count:'exact',head:true}).eq('status','late').gte('checked_in_at',monthStart),
    db.from('attendances').select('*, profiles(full_name,role_label,project)').gte('checked_in_at',todayStr+'T00:00:00').order('checked_in_at',{ascending:false}).limit(8),
    db.from('requests').select('*, profiles(full_name)').eq('status','pending').order('created_at',{ascending:false}).limit(5),
  ])

  const actHTML = (activity||[]).length===0
    ? `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sin registros hoy</div><div class="empty-sub">Los marcajes aparecerán aquí en tiempo real</div></div>`
    : (activity||[]).map(a=>{
        const isLate=a.status==='late', hasOut=!!a.checked_out_at
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-l);color:#1e40af;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${ini(a.profiles?.full_name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${a.profiles?.full_name||'—'}</div>
            <div style="font-size:11px;color:var(--text4)">${a.profiles?.role_label||''}${a.profiles?.project?' · '+a.profiles.project:''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--emerald)">↑ ${fmtTime(a.checked_in_at)}</div>
            ${hasOut?`<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:#6366f1">↓ ${fmtTime(a.checked_out_at)}</div>`:`<div style="font-size:11px;color:var(--text4)">En turno</div>`}
          </div>
          <span class="badge ${isLate?'badge-red':hasOut?'badge-green':'badge-live'}">${isLate?'⚠ Tarde':hasOut?'✓':'● Activo'}</span>
        </div>`
      }).join('')

  const reqHTML = (reqs||[]).length===0
    ? `<div class="empty-state" style="padding:20px 0"><div class="empty-icon" style="font-size:32px">✅</div><div class="empty-title" style="font-size:13px">Todo al día</div></div>`
    : (reqs||[]).map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:18px">${{inasistencia:'📋',reclamo:'⚠',cambio:'🔄'}[r.type]||'📋'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.profiles?.full_name||'—'}</div>
          <div style="font-size:11px;color:var(--text4)">${r.type||''}</div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-success btn-xs" onclick="approveReq('${r.id}',this)">✓</button>
          <button class="btn btn-danger btn-xs" onclick="rejectReq('${r.id}',this)">✗</button>
        </div>
      </div>`).join('')

  el('dash-content').innerHTML = `
    ${late>0?`<div class="alert alert-crit"><span class="alert-icon">🚨</span><div><div class="alert-title">${late} atraso${late>1?'s':''} este mes</div><div class="alert-msg"><button class="btn btn-xs" onclick="navigate('/alerts')" style="margin-top:4px">Ver detalle →</button></div></div></div>`:''}
    <div class="stats-grid">
      <div class="stat-card" onclick="navigate('/workers')"><div class="stat-bar" style="background:var(--accent)"></div><div class="stat-icon" style="background:var(--accent-l);color:var(--accent)">👥</div><div class="stat-label">Personal activo</div><div class="stat-val">${workers||0}</div><div class="stat-delta">Profesionales</div></div>
      <div class="stat-card" onclick="navigate('/shifts')"><div class="stat-bar" style="background:var(--emerald)"></div><div class="stat-icon" style="background:var(--emerald-l);color:var(--emerald)">✔</div><div class="stat-label">Turnos completados</div><div class="stat-val">${shifts||0}</div><div class="stat-delta">Este mes</div></div>
      <div class="stat-card" onclick="navigate('/alerts')"><div class="stat-bar" style="background:${late>0?'var(--amber)':'var(--emerald)'}"></div><div class="stat-icon" style="background:${late>0?'var(--amber-l)':'var(--emerald-l)'};color:${late>0?'var(--amber)':'var(--emerald)'}">⏰</div><div class="stat-label">Atrasos</div><div class="stat-val">${late||0}</div><div class="stat-delta ${late>0?'warn':''}">${late>0?'⚠ Revisar':'✓ Sin atrasos'}</div></div>
      <div class="stat-card" onclick="navigate('/geo')"><div class="stat-bar" style="background:var(--teal)"></div><div class="stat-icon" style="background:var(--teal-l);color:var(--teal)">📍</div><div class="stat-label">En turno ahora</div><div class="stat-val" id="active-now">—</div><div class="stat-delta"><span class="badge badge-live" style="font-size:10px">● En vivo</span></div></div>
    </div>
    <div class="g13">
      <div class="card" style="margin-bottom:0">
        <div class="card-hdr"><div><div class="card-title">Actividad de hoy</div><div class="card-sub">Entradas y salidas en tiempo real</div></div><div style="display:flex;gap:8px"><span class="badge badge-live">● En vivo</span><button class="btn btn-xs" onclick="navigate('/geo')">📍 Mapa</button></div></div>
        ${actHTML}
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card" style="margin-bottom:0">
          <div class="card-hdr" style="margin-bottom:12px"><div class="card-title">Solicitudes pendientes</div>${reqs?.length?`<span class="badge badge-red">${reqs.length}</span>`:''}</div>
          ${reqHTML}
        </div>
        <div class="card" style="margin-bottom:0">
          <div class="card-title" style="margin-bottom:14px">Acciones rápidas</div>
          ${[['👥','Agregar profesional','/users'],['📅','Programar turno','/shifts'],['📍','Mapa en vivo','/geo'],['💰','Gestionar pagos','/boletas']].map(([i,l,p])=>`
          <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="navigate('${p}')">
            <div style="width:36px;height:36px;border-radius:9px;background:var(--slate);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${i}</div>
            <div style="flex:1"><div style="font-weight:600;font-size:13px">${l}</div></div>
            <span style="color:var(--text4);font-size:18px">›</span>
          </div>`).join('')}
        </div>
      </div>
    </div>`

  // Load active count
  const {count:activeC} = await db.from('attendances').select('*',{count:'exact',head:true}).gte('checked_in_at',todayStr+'T00:00:00').is('checked_out_at',null)
  const an = el('active-now')
  if (an) an.textContent = activeC||0

  // Real-time: refresh dashboard when attendance changes
  if (window._dashRT) { try{window._dashRT.unsubscribe()}catch(_){} }
  window._dashRT = db.channel('dashboard_live')
    .on('postgres_changes',{event:'*',schema:'public',table:'attendances'},()=>{
      if(el('dash-content')) pageDashboard(el('page-content'))
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'requests'},()=>{
      if(el('dash-content')) pageDashboard(el('page-content'))
    })
    .subscribe()
}

window.approveReq = async (id, btn) => {
  btn.disabled=true
  await db.from('requests').update({status:'approved'}).eq('id',id)
  btn.closest('[style]').remove()
}
window.rejectReq = async (id, btn) => {
  btn.disabled=true
  await db.from('requests').update({status:'rejected'}).eq('id',id)
  btn.closest('[style]').remove()
}

      <td><select class="form-input" style="margin-bottom:0;font-size:12px;padding:5px 8px;max-width:180px;background:${w.project?'var(--accent-l)':'var(--slate)'};color:${w.project?'#1e40af':'var(--text4)'};font-weight:600;cursor:pointer" onchange="quickAssignProject('${w.id}',this.value)">
        <option value="">Sin proyecto</option>
        ${projOpts}
        ${w.project&&!(projects||[]).find(p=>p.name===w.project)?`<option value="${w.project}" selected>${w.project}</option>`:''}
      </select>${w.project&&(projects||[]).find(p=>p.name===w.project)?`<script>document.querySelector('select[onchange*="${w.id}"]').value='${w.project}'<\/script>`:''}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--text3)">${w.phone||w.email||'—'}</td>
      <td><span class="badge ${w.status==='active'?'badge-green':'badge-red'}">${w.status==='active'?'● Activo':'○ Inactivo'}</span></td>
      <td><div style="display:flex;gap:5px">
        <button class="btn btn-primary btn-xs" onclick="openEditWorker(${JSON.stringify(JSON.stringify(w))})">✏ Editar</button>
        <button class="btn btn-xs" onclick="toggleWorkerStatus('${w.id}','${w.status}')">${w.status==='active'?'⏸':'▶'}</button>
      </div></td>
    </tr>`
  }).join('')

  body.innerHTML = `
    <div id="worker-modal"></div>
    <div class="card" style="padding:12px 18px;margin-bottom:14px"><input class="form-input" style="margin-bottom:0" placeholder="🔍 Buscar por nombre, cargo o proyecto..." oninput="filterWorkersTable(this.value)" id="worker-search"/></div>
    ${projects?.length===0?'<div class="alert alert-warn"><span class="alert-icon">⚠</span><div><div class="alert-title">Sin proyectos</div><div class="alert-msg">Ve a ⚙ Configuración para crear proyectos primero.</div></div></div>':''}
    <div class="card"><div class="table-wrap"><table id="workers-table">
      <thead><tr><th>Profesional</th><th>Cargo</th><th>Proyecto asignado</th><th>Contacto</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Sin profesionales</div></div></td></tr>'}</tbody>
    </table></div></div>`

  // Set selected project values properly
  ;(workers||[]).forEach(w => {
    if (w.project) {
      const sel = body.querySelector(`select[onchange*="${w.id}"]`)
      if (sel) sel.value = w.project
    }
  })
}

window.filterWorkersTable = (q) => {
  const rows = document.querySelectorAll('#workers-table tbody tr')
  rows.forEach(row => { row.style.display = row.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none' })
}

window.quickAssignProject = async (id, project) => {
  await db.from('profiles').update({project}).eq('id',id)
}

window.toggleWorkerStatus = async (id, current) => {

  await db.from('profiles').update({status:next}).eq('id',id)

}

async function pageShifts(pc) {
  pc.innerHTML = `
  <div class="topbar"><div class="topbar-left"><div class="topbar-title">Gestión de Turnos</div><div class="topbar-sub">Seguimiento diario de asistencia</div></div>
    <div class="topbar-right">
      <button class="btn btn-sm" onclick="pageShifts(el('page-content'))">↻</button>
      <button class="btn btn-primary btn-sm" onclick="showShiftForm()">+ Nuevo turno</button>
    </div>
  </div>
  <div class="content" id="shifts-content"><div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spinner" style="width:32px;height:32px"></div></div></div>`
  await loadShiftsContent()
}

async function loadShiftsContent() {
  const body = el('shifts-content')
  if (!body) return

  const todayStr = today()
  const [{data:shifts},{data:workers},{data:att}] = await Promise.all([
    db.from('shifts').select('*, profiles(id,full_name,role_label)').order('shift_date',{ascending:false}).limit(200),
    db.from('profiles').select('id,full_name,role_label,project').eq('role','worker').eq('status','active').order('full_name'),
    db.from('attendances').select('id,worker_id,shift_id,status,checked_in_at,checked_out_at,late_minutes,checkin_lat').order('checked_in_at',{ascending:false}).limit(500),
  ])

  // Build attendance map
  const attMap = {}
  ;(att||[]).forEach(a=>{ if(a.shift_id) attMap[a.shift_id]=a })
  ;(att||[]).forEach(a=>{ if(!a.shift_id&&a.checked_in_at) attMap[`${a.worker_id}_${a.checked_in_at.slice(0,10)}`]=a })

  const getAtt = s => attMap[s.id] || attMap[`${s.worker_id}_${s.shift_date}`] || null

  const todayShifts = (shifts||[]).filter(s=>s.shift_date===todayStr)
  const activeNow   = todayShifts.filter(s=>{ const a=getAtt(s); return a?.checked_in_at&&!a?.checked_out_at })
  const doneToday   = todayShifts.filter(s=>{ const a=getAtt(s); return !!a?.checked_out_at })

  // Real-time shifts
  if (window._shiftsRT) { try{window._shiftsRT.unsubscribe()}catch(_){} }
  window._shiftsRT = db.channel('shifts_live')
    .on('postgres_changes',{event:'*',schema:'public',table:'attendances'},()=>{
      if(el('shifts-content')) loadShiftsContent()
    })
    .subscribe()

  // Current filter state
  const filterD  = window._shiftFilterD  || 'all'
  const filterW  = window._shiftFilterW  || 'all'
  const filterS  = window._shiftFilterS  || 'all'

  let displayed = [...(shifts||[])]
  if (filterD==='today')    displayed=displayed.filter(s=>s.shift_date===todayStr)
  else if (filterD==='week') { const w7=new Date(Date.now()-7*86400000).toISOString().slice(0,10); displayed=displayed.filter(s=>s.shift_date>=w7) }
  if (filterW!=='all')       displayed=displayed.filter(s=>s.worker_id===filterW)
  if (filterS!=='all')       displayed=displayed.filter(s=>{
    if (filterS==='in_progress') { const a=getAtt(s); return a?.checked_in_at&&!a?.checked_out_at }
    return s.status===filterS
  })

  const STATUS = {completed:'badge-green',in_progress:'badge-teal',scheduled:'badge-gray',late:'badge-amber',absent:'badge-red'}
  const SL     = {completed:'✅ Completado',in_progress:'● En curso',scheduled:'📅 Programado',late:'⚠ Atraso',absent:'❌ Inasistencia'}

  const rows = displayed.map(s=>{
    const a = getAtt(s)
    const isToday = s.shift_date===todayStr
    let liveSt = s.status, liveBadge = STATUS[s.status]||'badge-gray'
    if(a){ if(a.checked_in_at&&!a.checked_out_at){liveSt='in_progress';liveBadge='badge-teal'} else if(a.checked_out_at){liveSt=a.status==='late'?'late':'completed';liveBadge=STATUS[liveSt]||'badge-green'} }
    const attCell = a
      ? `<div style="line-height:1.7">
          <div style="font-family:var(--mono);font-size:12px;color:var(--emerald);font-weight:700">↑ ${fmtTime(a.checked_in_at)}${a.status==='late'&&a.late_minutes?` <span style="font-size:10px;color:var(--amber)">+${a.late_minutes}m</span>`:''}</div>
          ${a.checked_out_at?`<div style="font-family:var(--mono);font-size:12px;color:#6366f1;font-weight:700">↓ ${fmtTime(a.checked_out_at)}</div>`:`<div style="font-size:11px;color:var(--teal);font-weight:600">● Sin salida</div>`}
          ${a.checkin_lat?`<div style="font-size:9px;color:var(--text4)">📍 GPS ✓</div>`:''}
        </div>`
      : `<span style="font-size:12px;color:var(--text4);font-style:italic">${isToday?'Sin marcar':'—'}</span>`
    return `<tr style="${isToday&&a?.checked_in_at&&!a?.checked_out_at?'background:rgba(8,145,178,.04)':''}">
      <td><div style="font-weight:600;font-size:13px">${s.profiles?.full_name||'—'}</div><div style="font-size:11px;color:var(--text4)">${s.profiles?.role_label||''}</div></td>
      <td>${s.project?`<span class="badge badge-blue">${s.project}</span>`:`<span style="color:var(--text4)">—</span>`}</td>
      <td style="font-family:var(--mono);font-size:12px">${s.shift_date}${isToday?`<div style="font-size:10px;color:var(--accent);font-weight:700">HOY</div>`:''}</td>
      <td style="font-family:var(--mono);font-size:12px">${s.start_time}–${s.end_time}</td>
      <td>${attCell}</td>
      <td><span class="badge ${liveBadge}">${SL[liveSt]||liveSt}</span></td>
      <td style="font-family:var(--mono);font-weight:800;color:var(--emerald);font-size:12px;white-space:nowrap">${fmtCLP(s.fee)}</td>
      <td><div style="display:flex;gap:4px">
        ${s.status==='scheduled'?`<button class="btn btn-success btn-xs" onclick="markShift('${s.id}','completed')">✓</button><button class="btn btn-xs" onclick="markShift('${s.id}','absent')">✗</button>`:''}
        <button class="btn btn-danger btn-xs" onclick="deleteShift('${s.id}')">🗑</button>
      </div></td>
    </tr>`
  }).join('') || `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">${(shifts||[]).length===0?'Sin turnos registrados aún':'Sin turnos con este filtro'}</div><div class="empty-sub">${(shifts||[]).length===0?'Los turnos se crean automáticamente al marcar entrada, o créalos manualmente':'Cambia el filtro de período o estado'}</div></div></td></tr>`

  const wOpts = (workers||[]).map(w=>`<option value="${w.id}" ${filterW===w.id?'selected':''}>${w.full_name}</option>`).join('')

  body.innerHTML = `
    <div id="shift-modal-area"></div>
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="stat-bar" style="background:var(--accent)"></div><div class="stat-icon" style="background:var(--accent-l);color:var(--accent)">📅</div><div class="stat-label">Turnos hoy</div><div class="stat-val">${todayShifts.length}</div><div class="stat-delta">programados</div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--teal)"></div><div class="stat-icon" style="background:var(--teal-l);color:var(--teal)">🔄</div><div class="stat-label">En curso ahora</div><div class="stat-val">${activeNow.length}</div><div class="stat-delta badge badge-live" style="margin-top:4px">● activos</div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--emerald)"></div><div class="stat-icon" style="background:var(--emerald-l);color:var(--emerald)">✅</div><div class="stat-label">Completados hoy</div><div class="stat-val">${doneToday.length}</div><div class="stat-delta">con entrada y salida</div></div>
      <div class="stat-card"><div class="stat-bar" style="background:var(--amber)"></div><div class="stat-icon" style="background:var(--amber-l);color:var(--amber)">⏳</div><div class="stat-label">Sin marcar hoy</div><div class="stat-val">${todayShifts.length-activeNow.length-doneToday.length}</div><div class="stat-delta">pendientes</div></div>
    </div>
    <div class="card" style="padding:12px 18px;margin-bottom:14px">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <div style="display:flex;gap:4px">
          ${[['all','Todos'],['today','Hoy'],['week','7 días']].map(([v,l])=>`<button class="btn btn-sm ${filterD===v?'btn-primary':''}" onclick="window._shiftFilterD='${v}';loadShiftsContent()">${l}</button>`).join('')}
        </div>
        <select class="form-input" style="margin-bottom:0;font-size:12px;padding:6px 10px;min-width:160px" onchange="window._shiftFilterW=this.value;loadShiftsContent()">
          <option value="all">👥 Todos los profesionales</option>
          ${wOpts}
        </select>
      </div>
    </div>
    <div class="tabs">
      ${[['all','Todos'],['scheduled','Programados'],['in_progress','En curso'],['completed','Completados'],['late','Con atraso'],['absent','Inasistencias']].map(([v,l])=>`<div class="tab ${filterS===v?'active':''}" onclick="window._shiftFilterS='${v}';loadShiftsContent()">${l}</div>`).join('')}
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>Profesional</th><th>Proyecto</th><th>Fecha</th><th>Horario</th><th>Marcaje real</th><th>Estado</th><th>Honorario</th><th>Acciones</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`
}

window.markShift  = async (id,status) => { await db.from('shifts').update({status}).eq('id',id); loadShiftsContent() }
window.deleteShift= async (id) => { if(!confirm('¿Eliminar?'))return; await db.from('shifts').delete().eq('id',id); loadShiftsContent() }

window.showShiftForm = async () => {
  const [{data:workers},{data:projects},{data:cfg}] = await Promise.all([
    db.from('profiles').select('id,full_name,role_label,project').eq('role','worker').eq('status','active').order('full_name'),
    db.from('projects').select('id,name,fee_enfermera,fee_tens,fee_auxiliar,fee_admin').eq('active',true).order('name'),
    db.from('system_config').select('value').eq('key','role_fees').maybeSingle(),
  ])
  const rates = cfg?.value || {'Enfermera/o':35000,'TENS':28000,'Auxiliar de servicio':22000,'Administrativo':30000}
  const allProj = [...new Set([...(projects||[]).map(p=>p.name)])]

  const div = document.createElement('div')
  div.innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)this.parentNode.remove()">
    <div class="modal">
      <div class="modal-hdr"><div><div class="modal-title">Programar turno</div><div class="modal-sub">Asignar turno con honorario automático</div></div><button class="btn btn-ghost btn-sm" onclick="this.closest('.modal-bg').parentNode.remove()">✕</button></div>
      <div id="sf-err" class="auth-err" style="display:none"></div>
      <form id="shift-form">
        <div class="g2">
          <div class="form-group"><label class="form-label">Profesional *</label>
            <select class="form-input" id="sf-worker" required onchange="autoFillShiftFee(${JSON.stringify(JSON.stringify(workers||[]))},${JSON.stringify(JSON.stringify(projects||[]))},${JSON.stringify(JSON.stringify(rates))})">
              <option value="">Seleccionar...</option>
              ${(workers||[]).map(w=>`<option value="${w.id}" data-role="${w.role_label}" data-proj="${w.project||''}">${w.full_name} — ${w.role_label||''}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Proyecto</label>
            <select class="form-input" id="sf-project">
              <option value="">Sin proyecto</option>
              ${allProj.map(p=>`<option>${p}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label">Fecha *</label><input class="form-input" id="sf-date" type="date" required value="${today()}"/></div>
          <div class="form-group"><label class="form-label">Honorario (CLP) *</label><input class="form-input" id="sf-fee" type="number" required placeholder="28000" min="1"/></div>
          <div class="form-group"><label class="form-label">Hora inicio</label><input class="form-input" id="sf-start" type="time" value="08:00"/></div>
          <div class="form-group"><label class="form-label">Hora fin</label><input class="form-input" id="sf-end" type="time" value="17:00"/></div>
          <div class="form-group" style="grid-column:1/-1"><label class="form-label">Notas</label><textarea class="form-input" id="sf-notes" rows="2"></textarea></div>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">💾 Guardar turno</button>
      </form>
    </div>
  </div>`
  document.body.appendChild(div)
  el('shift-form').onsubmit = async e => {
    e.preventDefault()
    const wid=el('sf-worker').value, fee=el('sf-fee').value
    if(!wid){const err=el('sf-err');err.style.display='block';err.textContent='Selecciona un profesional';return}
    if(!fee||Number(fee)<=0){const err=el('sf-err');err.style.display='block';err.textContent='Ingresa el honorario';return}
    const {error} = await db.from('shifts').insert([{
      worker_id:wid, project:el('sf-project').value||null,
      shift_date:el('sf-date').value, fee:Number(fee),
      start_time:el('sf-start').value, end_time:el('sf-end').value,
      notes:el('sf-notes').value||null, status:'scheduled'
    }])
    if(error){const err=el('sf-err');err.style.display='block';err.textContent=error.message;return}
    div.remove(); loadShiftsContent()
  }
}

window.autoFillShiftFee = (wJson,pJson,rates) => {
  const workers=JSON.parse(wJson), projects=JSON.parse(pJson)
  const sel=el('sf-worker'); if(!sel)return
  const opt=sel.selectedOptions[0]; if(!opt||!opt.value)return
  const role=opt.dataset.role, proj=opt.dataset.proj
  if(proj){el('sf-project').value=proj}
  const projObj=projects.find(p=>p.name===proj)
  const feeMap={'Enfermera/o':projObj?.fee_enfermera,'TENS':projObj?.fee_tens,'Auxiliar de servicio':projObj?.fee_auxiliar,'Administrativo':projObj?.fee_admin}
  const fee=feeMap[role]||(typeof rates==='object'?rates[role]:0)||0
  if(fee) el('sf-fee').value=fee
}

async function loadGeoData() {
  const mode = el('geo-date')?.value || 'today'
  const todayStr = today()
  const from = mode==='today'?todayStr:mode==='yesterday'?new Date(Date.now()-86400000).toISOString().slice(0,10):new Date(Date.now()-7*86400000).toISOString().slice(0,10)
  const {data} = await db.from('attendances').select('*,profiles(full_name,role_label,project)').gte('checked_in_at',from+'T00:00:00').lte('checked_in_at',(mode==='week'?todayStr:from)+'T23:59:59').order('checked_in_at',{ascending:false})
  geoRecords = data||[]

  // Populate project filter
  const pf=el('geo-proj-filter'); if(!pf)return
  const projs=[...new Set(geoRecords.map(r=>r.profiles?.project).filter(Boolean))]
  const curVal=pf.value
  pf.innerHTML='<option value="all">Todos los proyectos</option>'+projs.map(p=>`<option value="${p}">${p}</option>`).join('')
  if(projs.includes(curVal))pf.value=curVal

  renderGeoMarkers()
}

function renderGeoMarkers() {
  const projF = el('geo-proj-filter')?.value||'all'
  const filtered = projF==='all' ? geoRecords : geoRecords.filter(r=>r.profiles?.project===projF)
  const withGeo  = filtered.filter(r=>r.checkin_lat)
  const active   = filtered.filter(r=>r.checked_in_at&&!r.checked_out_at)
  const done     = filtered.filter(r=>r.checked_out_at)
  const late     = filtered.filter(r=>r.status==='late')

  // Update stats
  if(el('gs-total'))  el('gs-total').textContent=filtered.length
  if(el('gs-active')) el('gs-active').textContent=active.length
  if(el('gs-late'))   el('gs-late').textContent=late.length
  if(el('gc-total'))  el('gc-total').textContent=filtered.length
  if(el('gc-active')) el('gc-active').textContent=active.length
  if(el('gc-done'))   el('gc-done').textContent=done.length

  // Draw map markers
  if (geoMap) {
    geoMarkers.forEach(m=>{try{geoMap.removeLayer(m)}catch(_){}})
    geoMarkers=[]
    const uids=[...new Set(filtered.map(r=>r.worker_id))]
    const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16','#f97316','#6366f1']
    const colorMap={}; uids.forEach((id,i)=>colorMap[id]=COLORS[i%COLORS.length])
    const bounds=[]
    filtered.forEach(r=>{
      if(!r.checkin_lat||!r.checkin_lng)return
      const color=colorMap[r.worker_id]||'#3b82f6'
      const isSel=r.id===geoSelected
      const sz=isSel?48:38
      const isAct=r.checked_in_at&&!r.checked_out_at
      const avatarIni=ini(r.profiles?.full_name)
      const icon=L.divIcon({
        html:`<div style="position:relative;width:${sz}px;height:${sz+10}px">
          ${isAct?`<div style="position:absolute;inset:-5px;border-radius:50%;border:2px solid ${color};opacity:.4;animation:pulse-badge 2s ease-in-out infinite"></div>`:''}
          <div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${color};border:${isSel?3:2}px solid rgba(255,255,255,${isSel?.9:.6});box-shadow:0 4px 16px ${color}66${isSel?',0 0 0 4px '+color+'33':''};display:flex;align-items:center;justify-content:center;font-size:${isSel?14:12}px;font-weight:900;color:#fff;font-family:system-ui;cursor:pointer">${avatarIni}</div>
          <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:${sz/4}px solid transparent;border-right:${sz/4}px solid transparent;border-top:${Math.round(sz/3)}px solid ${color};filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))"></div>
        </div>`,
        className:'', iconSize:[sz,sz+10], iconAnchor:[sz/2,sz+10], popupAnchor:[0,-(sz+10)],
      })
      const popup=`<div style="font-family:system-ui;min-width:210px;padding:0;background:#0f172a;color:#f1f5f9;border-radius:12px;overflow:hidden">
        <div style="background:${color}22;padding:12px 14px;border-bottom:1px solid ${color}33">
          <div style="font-weight:800;font-size:14px;color:#fff;margin-bottom:2px">${r.profiles?.full_name||'—'}</div>
          <div style="font-size:11px;color:${color};font-weight:600">${r.profiles?.role_label||''}</div>
          <div style="font-size:11px;color:#64748b;margin-top:1px">📍 ${r.profiles?.project||'—'}</div>
        </div>
        <div style="padding:10px 14px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div style="background:#0f2720;border-radius:6px;padding:8px;border:1px solid #10b98133;text-align:center">
              <div style="font-size:9px;color:#10b981;font-weight:700;margin-bottom:2px;text-transform:uppercase">ENTRADA</div>
              <div style="font-size:16px;font-weight:800;color:#10b981;font-family:monospace">${fmtTime(r.checked_in_at)}</div>
            </div>
            <div style="background:${r.checked_out_at?'#1e1040':'#1e293b'};border-radius:6px;padding:8px;border:1px solid ${r.checked_out_at?'#8b5cf633':'#334155'};text-align:center">
              <div style="font-size:9px;color:${r.checked_out_at?'#8b5cf6':'#475569'};font-weight:700;margin-bottom:2px;text-transform:uppercase">SALIDA</div>
              <div style="font-size:16px;font-weight:800;color:${r.checked_out_at?'#a78bfa':'#475569'};font-family:monospace">${r.checked_out_at?fmtTime(r.checked_out_at):'En turno'}</div>
            </div>
          </div>
          <div style="font-size:9px;color:#475569;font-family:monospace">${r.checkin_lat?.toFixed(5)}, ${r.checkin_lng?.toFixed(5)}</div>
          <div style="margin-top:8px;display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${r.status==='late'?'rgba(245,158,11,.2)':'rgba(16,185,129,.2)'};color:${r.status==='late'?'#f59e0b':'#10b981'};border:1px solid ${r.status==='late'?'rgba(245,158,11,.3)':'rgba(16,185,129,.3)'}">
            ${r.status==='late'?'⚠ Con atraso':'✓ Puntual'}
          </div>
        </div>
      </div>`
      try{
        const m=L.marker([r.checkin_lat,r.checkin_lng],{icon}).addTo(geoMap)
        m.bindPopup(popup,{maxWidth:250,className:''})
        m.on('click',()=>{geoSelected=r.id;renderGeoMarkers();m.openPopup()})
        if(isSel)setTimeout(()=>{try{m.openPopup()}catch(_){}},100)
        geoMarkers.push(m); bounds.push([r.checkin_lat,r.checkin_lng])
        if(r.checkout_lat&&r.checkout_lng){
          const outIcon=L.divIcon({html:`<div style="width:16px;height:16px;border-radius:50%;background:#7c3aed;border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:8px">🏁</div>`,className:'',iconSize:[16,16],iconAnchor:[8,8]})
          const m2=L.marker([r.checkout_lat,r.checkout_lng],{icon:outIcon}).addTo(geoMap)
          m2.bindPopup(`<div style="font-family:system-ui;font-size:12px;background:#0f172a;color:#f1f5f9;padding:8px 12px;border-radius:8px"><b>${r.profiles?.full_name}</b><br>Salida: ${fmtTime(r.checked_out_at)}</div>`,{className:''})
          geoMarkers.push(m2); bounds.push([r.checkout_lat,r.checkout_lng])
          const line=L.polyline([[r.checkin_lat,r.checkin_lng],[r.checkout_lat,r.checkout_lng]],{color,weight:2,opacity:.3,dashArray:'5 6'}).addTo(geoMap)
          geoMarkers.push(line)
        }
      }catch(_){}
    })
    if(bounds.length>0){try{geoMap.fitBounds(bounds,{padding:[50,50],maxZoom:15,animate:true})}catch(_){}}
    else {
      // Show no-GPS message
      if(!withGeo.length&&filtered.length>0){
        // overlays handled below
      }
    }
    setTimeout(()=>{try{geoMap.invalidateSize()}catch(_){}},100)
  }

  // Render sidebar list
  const listEl=el('geo-list'); if(!listEl)return
  const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#84cc16']
  const uids=[...new Set(filtered.map(r=>r.worker_id))]
  const colorMap={}; uids.forEach((id,i)=>colorMap[id]=COLORS[i%COLORS.length])

  if(filtered.length===0){
    listEl.innerHTML=`<div style="padding:40px 20px;text-align:center"><div style="font-size:32px;margin-bottom:10px">🛰</div><div style="color:#475569;font-size:13px;font-weight:600">Sin registros</div></div>`
    return
  }

  const byDate=filtered.reduce((acc,r)=>{const d=r.checked_in_at?.slice(0,10)||'x';if(!acc[d])acc[d]=[];acc[d].push(r);return acc},{})
  listEl.innerHTML=Object.entries(byDate).sort(([a],[b])=>b.localeCompare(a)).map(([date,recs])=>`
    <div style="padding:6px 14px;background:rgba(59,130,246,.05);border-bottom:1px solid rgba(59,130,246,.08);font-size:10px;font-weight:800;color:#3b82f6;text-transform:uppercase;letter-spacing:.1em;display:flex;justify-content:space-between">
      <span>${fmtDate(date)}</span><span style="color:#334155;font-weight:600">${recs.length} reg.</span>
    </div>
    ${recs.map(r=>{
      const isAct=r.checked_in_at&&!r.checked_out_at
      const isSel=r.id===geoSelected
      const color=colorMap[r.worker_id]||'#3b82f6'
      return `<div onclick="geoFlyTo('${r.worker_id}','${r.checkin_lat||''}','${r.checkin_lng||''}','${r.id}')"
        style="padding:10px 14px;border-bottom:1px solid rgba(59,130,246,.06);cursor:${r.checkin_lat?'pointer':'default'};background:${isSel?color+'12':'transparent'};border-left:3px solid ${isSel?color:'transparent'};transition:all .15s">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:5px">
          <div style="position:relative;flex-shrink:0">
            ${isAct?`<div style="position:absolute;inset:-2px;border-radius:50%;border:1px solid ${color};opacity:.5;animation:pulse-badge 2s ease-in-out infinite"></div>`:''}
            <div style="width:30px;height:30px;border-radius:50%;background:${color}22;border:2px solid ${color}55;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:${color}">${ini(r.profiles?.full_name)}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:12px;color:${isSel?color:'#e2e8f0'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.profiles?.full_name||'—'}</div>
            <div style="font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px">${r.profiles?.role_label||''}${r.profiles?.project?' · '+r.profiles.project:''}</div>
          </div>
          <div style="width:7px;height:7px;border-radius:50%;background:${r.status==='late'?'#f59e0b':isAct?'#10b981':'#475569'};flex-shrink:0;${isAct?'box-shadow:0 0 6px #10b981':''}"></div>
        </div>
        <div style="display:flex;gap:10px;font-size:10px;font-family:var(--mono)">
          <span style="color:#10b981;font-weight:700">↑ ${fmtTime(r.checked_in_at)}</span>
          ${r.checked_out_at?`<span style="color:#8b5cf6;font-weight:700">↓ ${fmtTime(r.checked_out_at)}</span>`:isAct?`<span style="color:#3b82f6">● activo</span>`:''}
        </div>
        ${!r.checkin_lat?`<div style="font-size:9px;color:#f59e0b;margin-top:2px">⚠ Sin GPS</div>`:''}
      </div>`
    }).join('')}
  `).join('')
}

window.geoFlyTo = (wid,lat,lng,rid) => {
  geoSelected=rid
  if(lat&&lng&&geoMap){try{geoMap.flyTo([parseFloat(lat),parseFloat(lng)],16,{duration:.8,animate:true})}catch(_){}}
  renderGeoMarkers()
}

window.doCheckin = async (shiftId, startTime, fee) => {
  const btn=document.querySelector('.checkin-btn')
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:18px;height:18px"></div> Obteniendo GPS...'}

  let lat=null,lng=null
  try{
    const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:12000,maximumAge:0}))
    lat=pos.coords.latitude; lng=pos.coords.longitude
  }catch(e){ console.warn('GPS not available:',e.message) }

  let activeShiftId = shiftId || null

  // Auto-create shift if none
  if(!shiftId){
    let newFee=0, newStart='08:00', newEnd='17:00'
    try{
      const dayKeys=['sun','mon','tue','wed','thu','fri','sat']
      const dayKey=dayKeys[new Date().getDay()]
      if(currentProfile?.project){
        const {data:proj}=await db.from('projects').select('*').eq('name',currentProfile.project).maybeSingle()
        if(proj){
          const fm={'Enfermera/o':proj.fee_enfermera,'TENS':proj.fee_tens,'Auxiliar de servicio':proj.fee_auxiliar,'Administrativo':proj.fee_admin}
          if(fm[currentProfile?.role_label]) newFee=fm[currentProfile.role_label]
          if(proj.schedule?.[dayKey]?.active){newStart=proj.schedule[dayKey].start||'08:00';newEnd=proj.schedule[dayKey].end||'17:00'}
        }
      }
      if(!newFee){const{data:cfg}=await db.from('system_config').select('value').eq('key','role_fees').maybeSingle();if(cfg?.value&&currentProfile?.role_label)newFee=cfg.value[currentProfile.role_label]||0}
    }catch(_){}
    const{data:ns}=await db.from('shifts').insert([{worker_id:currentUser.id,project:currentProfile?.project||null,shift_date:today(),start_time:newStart,end_time:newEnd,fee:newFee||0,status:'in_progress'}]).select().single()
    if(ns) activeShiftId=ns.id
  }

  // Check if late
  let status='present', lateMins=0
  if(startTime){
    const[h,m]=startTime.split(':').map(Number)
    const shiftStart=new Date(); shiftStart.setHours(h,m+5,0,0)
    if(new Date()>shiftStart){status='late';lateMins=Math.floor((Date.now()-shiftStart.getTime())/60000)}
  }

  const{error}=await db.from('attendances').insert([{worker_id:currentUser.id,shift_id:activeShiftId,status,late_minutes:lateMins,checked_in_at:new Date().toISOString(),checkin_lat:lat,checkin_lng:lng}])
  if(error){alert('Error al registrar: '+error.message);return}
  await renderCheckin()
}

window.doCheckout = async (attId, shiftId) => {
  const btn=el('checkout-btn')
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:18px;height:18px"></div> Obteniendo GPS...'}
  let lat=null,lng=null
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:12000,maximumAge:0}))
    lat=pos.coords.latitude;lng=pos.coords.longitude
  }catch(_){}
  await db.from('attendances').update({checked_out_at:new Date().toISOString(),checkout_lat:lat,checkout_lng:lng}).eq('id',attId)
  if(shiftId) await db.from('shifts').update({status:'completed'}).eq('id',shiftId)
  await renderCheckin()
}

      <div class="stat-card"><div class="stat-bar" style="background:var(--amber)"></div><div class="stat-icon" style="background:var(--amber-l);color:var(--amber)">⏰</div><div class="stat-label">Atrasos</div><div class="stat-val">${(shifts||[]).filter(s=>s.status==='late').length}</div></div>

  const file=input.files[0]; if(!file)return
  const path=`docs/${Date.now()}_${file.name.replace(/\s/g,'_')}`
  const {error:ue}=await db.storage.from('documents').upload(path,file)
  if(!ue){const {data:{publicUrl}}=db.storage.from('documents').getPublicUrl(path);await db.from('documents').insert([{name:file.name,file_url:publicUrl,file_type:file.type,size_bytes:file.size,category:'general'}]);loadDocs()}
  else alert('Error: '+ue.message); input.value=''
}

window.autoCalcPay = (shiftsJson) => {
  const shifts=JSON.parse(shiftsJson), wid=el('pm-worker')?.value, m=Number(el('pm-month')?.value), y=Number(el('pm-year')?.value)
  if(!wid){alert('Selecciona un profesional');return}
  const start=`${y}-${String(m).padStart(2,'0')}-01`, end=`${y}-${String(m).padStart(2,'0')}-31`
  const earned=shifts.filter(s=>s.worker_id===wid&&s.shift_date>=start&&s.shift_date<=end).reduce((a,s)=>a+(s.fee||0),0)
  if(earned>0) el('pm-amount').value=earned
  else alert('Sin turnos completados para este período')
}

window.approveAccount = async (id,email,pwd,name,role,rut,phone) => {
  if(!email||!pwd){alert('Faltan datos de la solicitud');return}
  const {data:authData,error:ae}=await db.auth.admin?.createUser({email,password:pwd}).catch(()=>({data:null,error:{message:'Admin API no disponible'}}))
  if(ae){
    // Fallback: just mark approved, admin creates user manually
    await db.from('account_requests').update({status:'approved'}).eq('id',id)
    // Try to insert profile if we have a user id somehow
    alert('Solicitud aprobada. Crea la cuenta manualmente en Supabase Auth > Users si es necesario.')
    pageAccounts(el('page-content')); return
  }
  if(authData?.user){
    await db.from('profiles').upsert([{id:authData.user.id,full_name:name,email,role:'worker',role_label:role,rut,phone,status:'active'}])
    await db.from('account_requests').update({status:'approved'}).eq('id',id)
  }
  pageAccounts(el('page-content'))
}
window.rejectAccount = async (id) => { await db.from('account_requests').update({status:'rejected'}).eq('id',id); pageAccounts(el('page-content')) }

async function loadSettings() {
  const body = el('set-c')
  if (!body) return

  const [{data:projects},{data:workers},{data:cfg}] = await Promise.all([
    db.from('projects').select('*').order('name'),
    db.from('profiles').select('id,full_name,role_label,project').eq('role','worker').eq('status','active').order('full_name'),
    db.from('system_config').select('*'),
  ])

  const rates = (cfg||[]).find(c=>c.key==='role_fees')?.value || {
    'Enfermera/o':35000,'TENS':28000,'Auxiliar de servicio':22000,'Administrativo':30000
  }

  const DAY = {mon:'Lunes',tue:'Martes',wed:'Miércoles',thu:'Jueves',fri:'Viernes',sat:'Sábado',sun:'Domingo'}
  const ROLE_FEE_MAP = {'Enfermera/o':'fee_enfermera','TENS':'fee_tens','Auxiliar de servicio':'fee_auxiliar','Administrativo':'fee_admin'}
  const ROLE_REQ_MAP = {'Enfermera/o':'required_enfermera','TENS':'required_tens','Auxiliar de servicio':'required_auxiliar','Administrativo':'required_admin'}

  // Build HTML
  let html = `<div id="settings-modal-area"></div>`

  // ── Global rates card ──
  html += `<div class="card" style="margin-bottom:18px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div class="card-title">💰 Tarifas globales por cargo</div>
        <div class="card-sub">Honorario base por turno · Se guarda en Supabase</div>
      </div>
      <button class="btn btn-sm" onclick="showRatesModal()">✏ Editar tarifas</button>
    </div>
    <div class="g2" style="gap:10px">
      ${Object.entries(rates).map(([role,fee])=>
        '<div style="background:var(--slate);border-radius:var(--r);padding:14px 16px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">' +
        '<div><div style="font-weight:700;font-size:13px">'+role+'</div><div style="font-size:11px;color:var(--text4)">por turno</div></div>' +
        '<div style="font-weight:800;font-size:16px;color:var(--emerald);font-family:var(--mono)">$'+Number(fee).toLocaleString('es-CL')+' CLP</div>' +
        '</div>'
      ).join('')}
    </div>
  </div>`

  // ── Projects section ──
  html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-size:15px;font-weight:700;color:var(--text1);letter-spacing:-.02em">🏥 Proyectos / Licitaciones</div>
    <span style="font-size:12px;color:var(--text4)">${(projects||[]).length} proyecto${(projects||[]).length!==1?'s':''}</span>
  </div>`

  if (!(projects||[]).length) {
    html += `<div style="background:var(--surface);border:2px dashed var(--border2);border-radius:var(--r-md);padding:48px 24px;text-align:center">
      <div style="font-size:48px;margin-bottom:14px">🏥</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px">Sin proyectos creados</div>
      <div style="font-size:13px;color:var(--text4);margin-bottom:18px">Crea tu primer proyecto para comenzar a gestionar turnos</div>
      <button class="btn btn-primary" onclick="showProjectModal(null)">+ Crear primer proyecto</button>
    </div>`
  }

  ;(projects||[]).forEach(p => {
    const pw = (workers||[]).filter(w=>w.project===p.name)
    const activeDays = p.schedule ? Object.entries(p.schedule).filter(([,d])=>d.active) : []
    const totalDotNeeded = ['required_enfermera','required_tens','required_auxiliar','required_admin'].reduce((a,k)=>a+(p[k]||0),0)
    const totalDotHave   = pw.length
    const dotOk = totalDotHave >= totalDotNeeded

    html += `<div class="card" style="margin-bottom:14px;padding:0;overflow:hidden;border-left:4px solid ${p.active?'var(--accent)':'var(--border2)'}">`
    // Header strip
    html += `<div style="padding:16px 20px 0">`
    html += `<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px">`
    html += `<div style="flex:1;min-width:0">`
    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">`
    html += `<div style="font-size:16px;font-weight:800;color:var(--text1);letter-spacing:-.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>`
    html += `<span class="badge ${p.active?'badge-green':'badge-gray'}" style="flex-shrink:0">${p.active?'● Activo':'○ Inactivo'}</span>`
    html += `</div>`
    if (p.hospital || p.location) {
      html += `<div style="font-size:12px;color:var(--text4)">`
      if (p.hospital) html += `🏥 ${p.hospital}  `
      if (p.location) html += `📍 ${p.location}`
      html += `</div>`
    }
    if (p.description) {
      html += `<div style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.5">${p.description}</div>`
    }
    html += `</div>` // end name div
    // Action buttons
    html += `<div style="display:flex;gap:6px;flex-shrink:0">`
    html += '<button class="btn btn-primary btn-sm" onclick="pmEdit(this)" data-pid="' + p.id + '">✏ Editar</button>'
    html += `<button class="btn btn-sm" onclick="toggleProjActive('${p.id}',${p.active})">${p.active?'⏸ Pausar':'▶ Activar'}</button>`
    html += '<button class="btn btn-danger btn-sm" onclick="deleteProj(\'' + p.id + '\',\'' + p.name.replace(/'/g,'&apos;') + '\')">' + '🗑</button>'
    html += `</div>` // end buttons
    html += `</div>` // end header row

    // Schedule chips
    if (activeDays.length) {
      html += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">`
      activeDays.forEach(([day,d])=>{
        html += `<span style="font-size:10px;font-weight:700;background:rgba(59,130,246,.1);color:#1e40af;border:1px solid rgba(59,130,246,.2);border-radius:6px;padding:3px 9px">${(DAY[day]||day).slice(0,3)} ${d.start}–${d.end}</span>`
      })
      html += `</div>`
    } else {
      html += `<div style="font-size:12px;color:var(--amber);margin-bottom:12px">⚠ Sin horario configurado — los trabajadores no podrán marcar atraso correctamente</div>`
    }

    // Dotation + fees row
    const roleRows = [
      ['Enfermera/o','fee_enfermera','required_enfermera'],
      ['TENS','fee_tens','required_tens'],
      ['Auxiliar de servicio','fee_auxiliar','required_auxiliar'],
      ['Administrativo','fee_admin','required_admin'],
    ].filter(([,fk,rk])=> (p[rk]||0)>0)

    if (roleRows.length) {
      html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">`
      roleRows.forEach(([label,fk,rk])=>{
        const assigned = pw.filter(w=>w.role_label===label).length
        const needed   = p[rk]||0
        const ok       = assigned>=needed
        html += `<div style="background:${ok?'var(--emerald-l)':'var(--amber-l)'};border:1px solid ${ok?'#6ee7b7':'#fde68a'};border-radius:8px;padding:8px 12px;min-width:90px;text-align:center">`
        html += `<div style="font-size:10px;font-weight:700;color:${ok?'var(--emerald-d)':'#92400e'};margin-bottom:3px">${label.split('/')[0]}</div>`
        html += `<div style="font-family:var(--mono);font-weight:800;font-size:16px;color:${ok?'var(--emerald-d)':'#92400e'}">${assigned}/${needed}</div>`
        html += `<div style="font-size:10px;color:${ok?'var(--emerald-d)':'#b45309'};margin-top:2px">$${Number(p[fk]||0).toLocaleString('es-CL')}</div>`
        html += `</div>`
      })
      // Total cost chip
      const cost = roleRows.reduce((a,[,fk,rk])=>a+(p[fk]||0)*(p[rk]||0),0)
      if (cost>0) {
        html += `<div style="background:var(--accent-l);border:1px solid #93c5fd;border-radius:8px;padding:8px 12px;min-width:90px;text-align:center">`
        html += `<div style="font-size:10px;font-weight:700;color:#1e40af;margin-bottom:3px">COSTO</div>`
        html += `<div style="font-family:var(--mono);font-weight:800;font-size:13px;color:#1e40af">$${cost.toLocaleString('es-CL')}</div>`
        html += `<div style="font-size:10px;color:#1e40af;margin-top:2px">por turno</div>`
        html += `</div>`
      }
      html += `</div>` // end dotation row
    }

    // Workers strip + assign button
    html += `<div style="border-top:1px solid var(--border);padding:12px 0;display:flex;align-items:center;justify-content:space-between;gap:12px">`
    if (pw.length>0) {
      html += `<div style="display:flex;flex-wrap:wrap;gap:5px;flex:1">`
      pw.forEach(w=>{
        const wname = (w.full_name||'').split(' ').slice(0,2).join(' ')
        const wrole = w.role_label ? w.role_label.split('/')[0] : ''
        html += `<span style="font-size:11px;font-weight:600;background:var(--accent-l);color:#1e40af;border-radius:20px;padding:3px 10px">${wname}${wrole?' · '+wrole:''}</span>`
      })
      html += `</div>`
    } else {
      html += `<span style="font-size:12px;color:var(--text4);flex:1">Sin profesionales asignados</span>`
    }
    html += '<button class="btn btn-primary btn-sm" style="flex-shrink:0" onclick="pmAssign(this)" data-pid="' + p.id + '" data-pname="' + encodeURIComponent(p.name) + '">&#x1F465; Asignar</button>'
    html += `</div>` // end workers strip

    html += `</div>` // end card padding
    html += `</div>` // end card
  })

  body.innerHTML = html
}

  const selected = [...document.querySelectorAll('.asgn-cb:checked')].map(c=>c.value)
  for (const w of allW) {
    if (selected.includes(w.id)) {
      await db.from('profiles').update({project:pname}).eq('id',w.id)

    }
  }
  closeAssignModal()
  loadSettings()
}

window.pmToggleDay = (day) => {
  const tog  = el('pm-tog-'+day)

  const times= el('pm-times-'+day)
  const noday= el('pm-noday-'+day)
  const lbl  = el('pm-dlabel-'+day)
  if (!tog) return
  const isOn = tog.style.background.includes('#3b82f6') || tog.style.background.includes('var(--accent)')
  if (isOn) {
    tog.style.background='#cbd5e1'; knob.style.left='3px'
    if(times)times.style.display='none'
    if(noday)noday.style.display='block'
    if(lbl)lbl.style.color='var(--text4)'

    tog.style.background='var(--accent)'; knob.style.left='22px'

window.pmAdjDot = (id, delta) => {
  const el2 = el(id)
  if (!el2) return
  el2.textContent = Math.max(0, (parseInt(el2.textContent)||0) + delta)
  pmUpdateCost()
}

window.pmUpdateCost = () => {
  const ROLES = [
    {fk:'pm-fee_enfermera',rk:'pm-req-required_enfermera'},
    {fk:'pm-fee_tens',      rk:'pm-req-required_tens'},
    {fk:'pm-fee_auxiliar',  rk:'pm-req-required_auxiliar'},
    {fk:'pm-fee_admin',     rk:'pm-req-required_admin'},
  ]
  let total = 0
  ROLES.forEach(r => {
    const fee = Number(el(r.fk)?.value)||0
    const req = Number(el(r.rk)?.textContent)||0
    total += fee * req
  })
  const cv = el('pm-cost-val')
  if (cv) cv.textContent = '$' + total.toLocaleString('es-CL') + ' CLP'
}

window.saveProjForm = async (e, projId) => {
  e.preventDefault()
  const name = el('pm-name')?.value?.trim()
  if (!name) {
    const errEl=el('pm-err'); if(errEl){errEl.style.display='block';errEl.textContent='El nombre es requerido'}
    return
  }

  // Build schedule
  const DAYS = ['mon','tue','wed','thu','fri','sat','sun']
  const finalSched = {}
  DAYS.forEach(day => {
    const tog  = el('pm-tog-'+day)
    const isOn = tog && (tog.style.background.includes('#3b82f6')||tog.style.background.includes('var(--accent)'))
    finalSched[day] = {
      active: !!isOn,
      start:  el('pm-start-'+day)?.value || '08:00',
      end:    el('pm-end-'+day)?.value   || '17:00',
    }
  })

  const data = {
    name,
    hospital:     el('pm-hospital')?.value     || null,
    location:     el('pm-location')?.value     || null,
    description:  el('pm-description')?.value  || null,
    instructions: el('pm-instructions')?.value || null,
    schedule:     finalSched,
    fee_enfermera:  Number(el('pm-fee_enfermera')?.value)  || 0,
    fee_tens:       Number(el('pm-fee_tens')?.value)       || 0,
    fee_auxiliar:   Number(el('pm-fee_auxiliar')?.value)   || 0,
    fee_admin:      Number(el('pm-fee_admin')?.value)      || 0,
    required_enfermera:  Number(el('pm-req-required_enfermera')?.textContent)  || 0,
    required_tens:       Number(el('pm-req-required_tens')?.textContent)       || 0,
    required_auxiliar:   Number(el('pm-req-required_auxiliar')?.textContent)   || 0,
    required_admin:      Number(el('pm-req-required_admin')?.textContent)      || 0,
    active: true,
  }

  const {error} = projId
    ? await db.from('projects').update(data).eq('id', projId)
    : await db.from('projects').insert([data])

  if (error) {
    const errEl=el('pm-err')
    if(errEl){
      errEl.style.display='block'
      errEl.textContent = error.code==='23505' ? 'Ya existe un proyecto con ese nombre.' : error.message
    }
    return
  }
  closeProjModal()
  loadSettings()
}
