async function loadFlujoData() {
  const body = el('flujo-content')
  if (!body) return
  body.innerHTML = '<div style="display:flex;justify-content:center;padding:60px"><div class="spinner" style="width:28px;height:28px"></div></div>'

  const projName  = el('flujo-proj-sel')?.value || ''
  const monthVal  = el('flujo-month-sel')?.value || (new Date().getFullYear()+'-'+(new Date().getMonth()+1))
  const [yr, mo]  = monthVal.split('-').map(Number)
  const mStart    = new Date(yr, mo-1, 1)
  const mEnd      = new Date(yr, mo, 0)
  const MONTHS    = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
  const DAYS_S    = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb']

  // Build list of workdays (Mon-Fri) in month
  const workdays = []
  for (let d = new Date(mStart); d <= mEnd; d.setDate(d.getDate()+1)) {
    const dow = d.getDay()
    if (dow>=1 && dow<=5) workdays.push(new Date(d))
  }

  // Load project config for prices
  const {data:proj}    = projName ? await db.from('projects').select('*').eq('name',projName).maybeSingle() : {data:null}
  const {data:cfg}     = await db.from('system_config').select('value').eq('key','role_fees').maybeSingle()
  const workerFees     = cfg?.value || {'Enfermera/o':35000,'TENS':28000,'Auxiliar de servicio':22000,'Administrativo':30000}

  // Precio empresa = sueldo * 1.35 por defecto (configurable en proyecto)
  const empresaMultiplier = 1.35

  // Load workers for this project
  const workerQuery = db.from('profiles').select('id,full_name,role_label,project').eq('role','worker').eq('status','active').order('full_name')
  if (projName) workerQuery.eq('project', projName)
  const {data:workers} = await workerQuery

  // Load attendances for this month
  const mStartStr = mStart.toISOString().slice(0,10)
  const mEndStr   = mEnd.toISOString().slice(0,10)
  const {data:atts} = await db.from('attendances')
    .select('worker_id,checked_in_at,checked_out_at,status')
    .gte('checked_in_at', mStartStr+'T00:00:00')
    .lte('checked_in_at', mEndStr+'T23:59:59')

  // Also load shifts for fee data
  const {data:shifts} = await db.from('shifts')
    .select('worker_id,shift_date,fee,status')
    .gte('shift_date', mStartStr)
    .lte('shift_date', mEndStr)

  // Index attendance by worker+date
  const attMap = {}
  ;(atts||[]).forEach(a => {
    const d = a.checked_in_at?.slice(0,10)
    if (!attMap[a.worker_id]) attMap[a.worker_id] = {}
    attMap[a.worker_id][d] = a
  })

  // Index shifts by worker+date
  const shiftMap = {}
  ;(shifts||[]).forEach(s => {
    if (!shiftMap[s.worker_id]) shiftMap[s.worker_id] = {}
    shiftMap[s.worker_id][s.shift_date] = s
  })

  const allWorkers = workers || []
  if (!allWorkers.length) {
    body.innerHTML = '<div class="empty-state" style="padding:80px 24px"><div class="empty-icon">👥</div><div class="empty-title">Sin profesionales'+(projName?' en '+projName:'')+' </div><div class="empty-sub">Asigna profesionales al proyecto en Configuración</div></div>'
    return
  }

  // Calculate totals
  let totalHonorarios = 0, totalIngreso = 0, totalProfit = 0, totalTurnos = 0
  const workerTotals = {}

  allWorkers.forEach(w => {
    const workerFee     = workerFees[w.role_label] || 0
    const empresaFee    = Math.round(workerFee * empresaMultiplier)
    const profit        = empresaFee - workerFee
    let   wTurnos = 0, wHonorario = 0, wIngreso = 0, wProfit = 0

    workdays.forEach(day => {
      const dStr = day.toISOString().slice(0,10)
      const att  = attMap[w.id]?.[dStr]
      const shft = shiftMap[w.id]?.[dStr]
      if (att?.checked_in_at) {
        wTurnos++
        const fee = shft?.fee || workerFee
        wHonorario += fee
        const empresa = Math.round(fee * empresaMultiplier)
        wIngreso += empresa
        wProfit  += empresa - fee
      }
    })

    workerTotals[w.id] = { fee:workerFee, empresaFee, profit, turnos:wTurnos, honorario:wHonorario, ingreso:wIngreso, profitTotal:wProfit }
    totalHonorarios += wHonorario
    totalIngreso    += wIngreso
    totalProfit     += wProfit
    totalTurnos     += wTurnos
  })

  const margen = totalIngreso > 0 ? Math.round(totalProfit/totalIngreso*100) : 0

  // Limit workdays shown (max 22 for readability)
  const showDays = workdays.slice(0, 22)

  // Build HTML
  let html = ''

  // ── KPI strip ──
  html += '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">'
  html += kpiCard('📅','Turnos asistidos',totalTurnos,'este mes','var(--accent)','var(--accent-l)')
  html += kpiCard('💰','Honorarios pagados','$'+totalHonorarios.toLocaleString('es-CL'),'costo profesionales','var(--amber)','var(--amber-l)')
  html += kpiCard('🏢','Ingresos empresa','$'+totalIngreso.toLocaleString('es-CL'),'facturación total','var(--emerald)','var(--emerald-l)')
  html += kpiCard('📈','Profit neto','$'+totalProfit.toLocaleString('es-CL'),margen+'% margen','var(--teal)','var(--teal-l)')
  html += '</div>'

  // ── Attendance grid ──
  html += '<div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">'
  // Header
  html += '<div style="padding:14px 20px;background:linear-gradient(135deg,var(--navy),#162447);display:flex;justify-content:space-between;align-items:center">'
  html += '<div style="color:#fff"><div style="font-weight:700;font-size:14px">Control de Asistencia — '+MONTHS[mo]+' '+yr+'</div>'
  html += '<div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:2px">'+(projName||'Todos los proyectos')+' · '+workdays.length+' días hábiles</div></div>'
  html += '<div style="display:flex;gap:12px;font-size:11px">'
  html += '<span style="background:rgba(5,150,105,.2);border:1px solid rgba(5,150,105,.4);border-radius:4px;padding:2px 8px;color:#6ee7b7">✓ Asistió</span>'
  html += '<span style="background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.4);border-radius:4px;padding:2px 8px;color:#fca5a5">✗ No asistió</span>'
  html += '<span style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:2px 8px;color:rgba(255,255,255,.4)">~ Pendiente</span>'
  html += '</div></div>'

  // Scrollable grid
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">'
  html += '<table style="min-width:900px;border-collapse:collapse;font-size:12px">'

  // thead
  html += '<thead><tr style="background:#f8fafc">'
  html += '<th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;left:0;background:#f8fafc;z-index:2;min-width:200px">Profesional</th>'
  html += '<th style="padding:10px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap">Cargo</th>'
  html += '<th style="padding:10px 8px;text-align:right;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap">Sueldo/T</th>'
  html += '<th style="padding:10px 8px;text-align:right;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap">Precio Emp.</th>'
  showDays.forEach(day => {
    const dow = DAYS_S[day.getDay()]
    const dd  = String(day.getDate()).padStart(2,'0')
    const mm  = String(day.getMonth()+1).padStart(2,'0')
    html += '<th style="padding:8px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border);min-width:42px;white-space:nowrap">'+dow+'<br><span style="font-weight:400;color:var(--text4)">'+dd+'/'+mm+'</span></th>'
  })
  html += '<th style="padding:10px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border)">T.</th>'
  html += '<th style="padding:10px 8px;text-align:right;font-size:11px;font-weight:700;color:var(--emerald);border-bottom:2px solid var(--border);white-space:nowrap">Honorario</th>'
  html += '<th style="padding:10px 8px;text-align:right;font-size:11px;font-weight:700;color:var(--accent);border-bottom:2px solid var(--border);white-space:nowrap">Ingreso Emp.</th>'
  html += '<th style="padding:10px 8px;text-align:right;font-size:11px;font-weight:700;color:var(--teal);border-bottom:2px solid var(--border);white-space:nowrap">Profit</th>'
  html += '<th style="padding:10px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);border-bottom:2px solid var(--border)">%</th>'
  html += '</tr></thead><tbody>'

  // rows
  allWorkers.forEach((w, i) => {
    const t = workerTotals[w.id]
    const pct = workdays.length > 0 ? Math.round(t.turnos/showDays.length*100) : 0
    const bg = i%2===0 ? '#fff' : '#fafbfc'
    html += '<tr id="frow-'+w.id+'" style="background:'+bg+';transition:background .1s" onmouseover="this.style.background=\'#f0f7ff\'" onmouseout="this.style.background=\''+bg+'\'">'
    // Name (sticky) - con botón editar inline
    html += '<td style="padding:8px 14px;font-weight:600;font-size:12px;border-bottom:1px solid var(--border);position:sticky;left:0;background:'+bg+';z-index:1;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis">'
    html += '<div style="display:flex;align-items:center;gap:6px">'
    html += '<span style="overflow:hidden;text-overflow:ellipsis">'+(w.full_name||'—')+'</span>'
    html += '<button onclick="flujoEditFee(\''+w.id+'\',\''+w.role_label+'\','+t.fee+','+t.empresaFee+')" title="Editar tarifas" style="flex-shrink:0;background:none;border:none;cursor:pointer;font-size:11px;color:var(--text4);padding:2px 4px;border-radius:4px;line-height:1" onmouseover="this.style.color=\'var(--accent)\'" onmouseout="this.style.color=\'var(--text4)\'">✏</button>'
    html += '</div></td>'
    html += '<td style="padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)"><span class="badge badge-gray" style="font-size:10px">'+(w.role_label||'—')+'</span></td>'
    html += '<td id="fcell-fee-'+w.id+'" style="padding:10px 8px;text-align:right;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--border);white-space:nowrap">$'+t.fee.toLocaleString('es-CL')+'</td>'
    html += '<td id="fcell-emp-'+w.id+'" style="padding:10px 8px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--accent);border-bottom:1px solid var(--border);white-space:nowrap">$'+t.empresaFee.toLocaleString('es-CL')+'</td>'

    showDays.forEach(day => {
      const dStr = day.toISOString().slice(0,10)
      const att  = attMap[w.id]?.[dStr]
      let cell = '', cellStyle = 'padding:6px 3px;text-align:center;border-bottom:1px solid var(--border);border-left:1px solid #f0f0f0;'
      if (att?.checked_in_at && att?.checked_out_at) {
        cell = '<span style="display:inline-block;background:#dcfce7;color:#166534;border-radius:4px;padding:2px 5px;font-size:10px;font-weight:700">✓</span>'
      } else if (att?.checked_in_at) {
        cell = '<span style="display:inline-block;background:#fef9c3;color:#92400e;border-radius:4px;padding:2px 5px;font-size:10px;font-weight:700">⏳</span>'
      } else if (day > new Date()) {
        cell = '<span style="color:#cbd5e1;font-size:11px">·</span>'
      } else {
        cell = '<span style="display:inline-block;background:#fee2e2;color:#991b1b;border-radius:4px;padding:2px 5px;font-size:10px;font-weight:700">✗</span>'
      }
      html += '<td style="'+cellStyle+'">'+cell+'</td>'
    })

    // Totals
    html += '<td style="padding:10px 8px;text-align:center;font-family:var(--mono);font-weight:800;font-size:13px;border-bottom:1px solid var(--border);color:var(--text1)">'+t.turnos+'</td>'
    html += '<td style="padding:10px 8px;text-align:right;font-family:var(--mono);font-weight:700;font-size:12px;border-bottom:1px solid var(--border);color:var(--emerald);white-space:nowrap">$'+t.honorario.toLocaleString('es-CL')+'</td>'
    html += '<td style="padding:10px 8px;text-align:right;font-family:var(--mono);font-weight:700;font-size:12px;border-bottom:1px solid var(--border);color:var(--accent);white-space:nowrap">$'+t.ingreso.toLocaleString('es-CL')+'</td>'
    html += '<td style="padding:10px 8px;text-align:right;font-family:var(--mono);font-weight:700;font-size:12px;border-bottom:1px solid var(--border);color:var(--teal);white-space:nowrap">$'+t.profitTotal.toLocaleString('es-CL')+'</td>'
    html += '<td style="padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)">'
    html += '<div style="font-size:11px;font-weight:700;color:'+(pct>=80?'var(--emerald)':pct>=50?'var(--amber)':'var(--red)')+'">'+pct+'%</div>'
    html += '</td></tr>'
  })

  // Totals row
  html += '<tr style="background:linear-gradient(135deg,#f0f7ff,#e8f4f8);font-weight:700">'
  html += '<td colspan="4" style="padding:12px 14px;font-size:12px;border-top:2px solid var(--border);position:sticky;left:0;background:#e8f4f8;z-index:1">TOTALES '+MONTHS[mo].toUpperCase()+' '+yr+'</td>'
  showDays.forEach(day => {
    const dStr = day.toISOString().slice(0,10)
    const count = allWorkers.filter(w=>attMap[w.id]?.[dStr]?.checked_in_at).length
    html += '<td style="padding:8px 4px;text-align:center;border-top:2px solid var(--border);font-size:11px;font-weight:800;color:var(--accent)">'+(count>0?count:'')+'</td>'
  })
  html += '<td style="padding:12px 8px;text-align:center;font-family:var(--mono);font-weight:800;font-size:14px;border-top:2px solid var(--border)">'+totalTurnos+'</td>'
  html += '<td style="padding:12px 8px;text-align:right;font-family:var(--mono);font-weight:800;font-size:13px;border-top:2px solid var(--border);color:var(--emerald);white-space:nowrap">$'+totalHonorarios.toLocaleString('es-CL')+'</td>'
  html += '<td style="padding:12px 8px;text-align:right;font-family:var(--mono);font-weight:800;font-size:13px;border-top:2px solid var(--border);color:var(--accent);white-space:nowrap">$'+totalIngreso.toLocaleString('es-CL')+'</td>'
  html += '<td style="padding:12px 8px;text-align:right;font-family:var(--mono);font-weight:800;font-size:13px;border-top:2px solid var(--border);color:var(--teal);white-space:nowrap">$'+totalProfit.toLocaleString('es-CL')+'</td>'
  html += '<td style="padding:12px 8px;text-align:center;border-top:2px solid var(--border);font-weight:800;color:var(--teal)">'+margen+'%</td>'
  html += '</tr>'
  html += '</tbody></table></div>'

  // ── Financial summary ──
  html += '<div style="padding:16px 20px;background:#fafbfc;border-top:2px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:0">'
  const summaryItems = [
    ['Total honorarios profesionales',totalHonorarios,'var(--amber)'],
    ['Total ingresos empresa',totalIngreso,'var(--emerald)'],
    ['Profit neto empresa',totalProfit,'var(--teal)'],
    ['Margen de rentabilidad',margen+'%','var(--accent)'],
  ]
  summaryItems.forEach(([label,val,color],i) => {
    html += '<div style="padding:12px 16px;'+(i<3?'border-right:1px solid var(--border)':'')+'">'
    html += '<div style="font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">'+label+'</div>'
    html += '<div style="font-family:var(--mono);font-weight:800;font-size:16px;color:'+color+'">$'+(typeof val==='string'?val:val.toLocaleString('es-CL'))+'</div>'
    html += '</div>'
  })
  html += '</div>'
  html += '</div>' // end card

  body.innerHTML = html
}

function kpiCard(icon, label, value, delta, color, bg) {
  return '<div class="stat-card">' +
    '<div class="stat-bar" style="background:'+color+'"></div>' +
    '<div class="stat-icon" style="background:'+bg+';color:'+color+'">'+icon+'</div>' +
    '<div class="stat-label">'+label+'</div>' +
    '<div style="font-size:16px;font-weight:800;color:var(--text1);margin-top:6px;font-family:var(--mono)">'+value+'</div>' +
    '<div class="stat-delta">'+delta+'</div>' +
  '</div>'
}

// ── Flujo: editar tarifa de un profesional ──
window.flujoEditFee = function(wid, roleLabel, currentFee, currentEmp) {
  // Remove existing modal if any
  const old = document.getElementById('flujo-fee-modal')
  if (old) old.remove()

  const mult = currentFee > 0 ? (currentEmp / currentFee) : 1.35

  const modal = document.createElement('div')
  modal.id = 'flujo-fee-modal'
  modal.className = 'modal-bg'
  modal.innerHTML = `
    <div class="modal" style="max-width:420px">
      <div class="modal-hdr">
        <div>
          <div class="modal-title">✏ Editar tarifas</div>
          <div class="modal-sub">${roleLabel} · Guardado en system_config</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('flujo-fee-modal').remove()">✕</button>
      </div>
      <div id="ffee-err" class="auth-err" style="display:none;margin-bottom:12px"></div>
      <div class="form-group">
        <label class="form-label">Honorario por turno (CLP)</label>
        <input id="ffee-val" class="form-input" type="number" min="0" value="${currentFee}" oninput="ffeeCalcEmp()"/>
      </div>
      <div class="form-group">
        <label class="form-label">Multiplicador empresa <span style="color:var(--text4);font-weight:400">(honorario × multiplicador = precio empresa)</span></label>
        <input id="ffee-mult" class="form-input" type="number" min="1" step="0.01" value="${mult.toFixed(2)}" oninput="ffeeCalcEmp()"/>
      </div>
      <div style="background:var(--accent-l);border:1px solid #93c5fd;border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:700;color:#1e3a8a">Precio empresa calculado</span>
        <span id="ffee-preview" style="font-family:var(--mono);font-weight:800;font-size:16px;color:#1e3a8a">$${currentEmp.toLocaleString('es-CL')}</span>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="ffeeGuardar('${wid}','${roleLabel}')">💾 Guardar</button>
        <button class="btn" onclick="document.getElementById('flujo-fee-modal').remove()">Cancelar</button>
      </div>
    </div>`
  document.body.appendChild(modal)
}

window.ffeeCalcEmp = function() {
  const fee = Number(document.getElementById('ffee-val')?.value) || 0
  const mult = Number(document.getElementById('ffee-mult')?.value) || 1.35
  const emp = Math.round(fee * mult)
  const prev = document.getElementById('ffee-preview')
  if (prev) prev.textContent = '$' + emp.toLocaleString('es-CL')
}

window.ffeeGuardar = async function(wid, roleLabel) {
  const fee = Number(document.getElementById('ffee-val')?.value) || 0
  const mult = Number(document.getElementById('ffee-mult')?.value) || 1.35
  if (fee <= 0) {
    const errEl = document.getElementById('ffee-err')
    if (errEl) { errEl.style.display='block'; errEl.textContent='El honorario debe ser mayor a 0' }
    return
  }

  // Load current fees config
  const {data:cfg} = await db.from('system_config').select('value').eq('key','role_fees').maybeSingle()
  const fees = cfg?.value || {}
  fees[roleLabel] = fee

  // Save to system_config
  const {error} = await db.from('system_config').upsert({key:'role_fees', value: fees}, {onConflict:'key'})
  if (error) {
    const errEl = document.getElementById('ffee-err')
    if (errEl) { errEl.style.display='block'; errEl.textContent=error.message }
    return
  }

  document.getElementById('flujo-fee-modal')?.remove()
  // Reload flujo
  await loadFlujoData()
}

// ── Flujo: gestionar profesiones y tarifas globales ──
window.showFlujoProfsModal = async function() {
  const area = document.getElementById('flujo-modal-area')
  if (!area) return

  const {data:cfg} = await db.from('system_config').select('value').eq('key','role_fees').maybeSingle()
  const fees = cfg?.value || {'Enfermera/o':35000,'TENS':28000,'Auxiliar de servicio':22000,'Administrativo':30000}

  const buildRows = (feesObj) => Object.entries(feesObj).map(([role, fee], idx) => `
    <div id="prof-row-${idx}" style="display:grid;grid-template-columns:1fr 150px 36px;gap:8px;align-items:center;margin-bottom:8px">
      <input class="form-input" style="margin-bottom:0;font-size:13px" value="${role}" placeholder="Nombre profesión" id="prof-name-${idx}"/>
      <div style="display:flex;align-items:center;gap:6px">
        <input class="form-input" style="margin-bottom:0;font-family:var(--mono);font-size:13px;text-align:right" type="number" min="0" value="${fee}" id="prof-fee-${idx}"/>
      </div>
      <button class="btn btn-danger btn-xs" style="padding:6px;justify-content:center" onclick="fpRemoveRow(${idx})">✕</button>
    </div>`).join('')

  area.innerHTML = `<div class="modal-bg" id="flujo-profs-modal">
    <div class="modal" style="max-width:520px">
      <div class="modal-hdr">
        <div>
          <div class="modal-title">👔 Profesiones & Tarifas globales</div>
          <div class="modal-sub">Define los cargos y su honorario base por turno</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('flujo-profs-modal').remove()">✕</button>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:grid;grid-template-columns:1fr 150px 36px;gap:8px">
        <span>Profesión / Cargo</span><span style="text-align:right;padding-right:4px">Honorario/turno</span><span></span>
      </div>
      <div id="fp-rows">${buildRows(fees)}</div>
      <div id="fp-err" class="auth-err" style="display:none;margin:10px 0"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-sm" onclick="fpAddRow()" style="flex-shrink:0">+ Agregar cargo</button>
        <div style="flex:1"></div>
        <button class="btn" onclick="document.getElementById('flujo-profs-modal').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="fpGuardar()">💾 Guardar</button>
      </div>
      <div style="margin-top:14px;padding:10px 14px;background:var(--amber-l);border:1px solid #fde68a;border-radius:var(--r);font-size:12px;color:#92400e">
        ⚠ Los honorarios aquí son tarifas base globales. Puedes ajustar la tarifa de un profesional individualmente haciendo clic en el ✏ en la tabla.
      </div>
    </div>
  </div>`

  // Store current index count for add
  area._fpCount = Object.keys(fees).length
  area._fpFees  = fees
}

window.fpAddRow = function() {
  const area = document.getElementById('flujo-modal-area')
  const rows  = document.getElementById('fp-rows')
  if (!rows || !area) return
  const idx = (area._fpCount || 0)
  area._fpCount = idx + 1
  const div = document.createElement('div')
  div.id = 'prof-row-'+idx
  div.style.cssText = 'display:grid;grid-template-columns:1fr 150px 36px;gap:8px;align-items:center;margin-bottom:8px'
  div.innerHTML = `
    <input class="form-input" style="margin-bottom:0;font-size:13px" placeholder="Nombre profesión" id="prof-name-${idx}"/>
    <input class="form-input" style="margin-bottom:0;font-family:var(--mono);font-size:13px;text-align:right" type="number" min="0" placeholder="0" id="prof-fee-${idx}"/>
    <button class="btn btn-danger btn-xs" style="padding:6px;justify-content:center" onclick="fpRemoveRow(${idx})">✕</button>`
  rows.appendChild(div)
}

window.fpRemoveRow = function(idx) {
  document.getElementById('prof-row-'+idx)?.remove()
}

window.fpGuardar = async function() {
  const rows = document.getElementById('fp-rows')
  if (!rows) return
  const newFees = {}
  let valid = true
  rows.querySelectorAll('[id^="prof-row-"]').forEach(row => {
    const idx = row.id.split('-')[2]
    const name = document.getElementById('prof-name-'+idx)?.value?.trim()
    const fee  = Number(document.getElementById('prof-fee-'+idx)?.value) || 0
    if (name) newFees[name] = fee
    else valid = false
  })
  if (!valid || Object.keys(newFees).length === 0) {
    const errEl = document.getElementById('fp-err')
    if (errEl) { errEl.style.display='block'; errEl.textContent='Todos los cargos deben tener nombre' }
    return
  }
  const {error} = await db.from('system_config').upsert({key:'role_fees', value: newFees}, {onConflict:'key'})
  if (error) {
    const errEl = document.getElementById('fp-err')
    if (errEl) { errEl.style.display='block'; errEl.textContent=error.message }
    return
  }
  document.getElementById('flujo-profs-modal')?.remove()
  await loadFlujoData()
}
